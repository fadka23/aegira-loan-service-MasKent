name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on:
      - self-hosted
      - docker-local

    steps:
      - uses: actions/checkout@v4

      - name: Build Backend
        working-directory: aegira-loan-service
        run: mvn clean package -DskipTests

  frontend:
    runs-on:
      - self-hosted
      - docker-local

    steps:
      - uses: actions/checkout@v4

      - name: Build Frontend
        working-directory: creditappdemo
        run: |
          npm install
          npm run build

  dockerhub:
    needs:
      - backend
      - frontend

    runs-on:
      - self-hosted
      - docker-local

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
          -u "${{ secrets.DOCKERHUB_USERNAME }}" \
          --password-stdin

      - name: Build Backend Image
        run: |
          docker build \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest \
          ./aegira-loan-service

      - name: Push Backend Image
        run: |
          docker push \
          ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

      - name: Build Frontend Image
        run: |
          docker build \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest \
          ./creditappdemo

      - name: Push Frontend Image
        run: |
          docker push \
          ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

  deploy:
    needs:
      - dockerhub

    runs-on:
      - self-hosted
      - docker-local

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
          -u "${{ secrets.DOCKERHUB_USERNAME }}" \
          --password-stdin

      - name: Pull Latest Images
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

      - name: Deploy Application
        run: |
          docker compose down
          docker compose up -d 
          